<!DOCTYPE html>
<html>
  <div id="Form">
    <h3>Select {{returnPlayerType()}}</h3>
    @for (player of returnTeamForm(); track player) {
    <input id="playerChosen" type="radio" value="{{player}}" [formControl]="playerChosen" />
    <label for="playerChosen">{{player}}</label>
    }
    <button (click)="confirmPlayerChosenEv()">Confirm:<br>{{returnPlayerName()}}</button>
  </div>
</html>
