<!DOCTYPE html>
<html>

<div id="RunForm">
  <h4>How many runs scored?</h4>
  <button id="Dec" (click)="decrementRuns()">-</button>
  <label>{{runsScored()}}</label>
  <button id="Inc" (click)="incrementRuns()">+</button>
  <button id="Confirm" (click)="confirmRuns()">Confirm</button>
</div>

</html>
