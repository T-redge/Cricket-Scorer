<!DOCTYPE html>
<html>
<div id="EventButtons">
  <h4>Delivery Event</h4>
    @if (overComplete()) {
      <button id="EndOver" >End Over</button>
    } @else {
      <button id="Dot" >Dot</button>
      <button id="Runs" >Runs</button>
      <button id="Extra" >Extra</button>
      <button id="Wicket" >Wicket</button>
    }
</div>

</html>
