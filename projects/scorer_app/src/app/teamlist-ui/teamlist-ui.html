<!DOCTYPE html>
<html>
<div id="TeamLists">
<h3>Playing XI's</h3>
<div id="Home">
  <h4>{{returnHomeName()}}</h4>
  @for (name of returnHomePlayerList(); track $index) {
  <li>{{name}}</li>
  }
</div>
<div id="Away">
  <h4>{{returnAwayName()}}</h4>
  @for (name of returnAwayPlayerList(); track $index) {
  <li>{{name}}</li>
  }
</div>

<button (click)="eventMatchStarted()" id="Confirm Teams">Confirm</button>
</div>
</html>
